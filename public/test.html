<!DOCTYPE html>
<html>
<body>
<button id="btn">Play</button>
<script>
document.getElementById('btn').onclick = () => {
  const audio = new Audio('/FocusFlow/assets/Nightingale.mp3');
  audio.crossOrigin = 'use-credentials';
  audio.play().then(() => console.log('success')).catch(e => console.error(e));
};
</script>
</body>
</html>
